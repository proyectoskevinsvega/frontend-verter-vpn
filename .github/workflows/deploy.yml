name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            REPO_DIR="/var/www/verter-vpn/source"
            REPO_URL="https://github.com/proyectoskevinsvega/frontend-verter-vpn.git"

            # Clone si no existe, pull si ya existe
            if [ -d "$REPO_DIR/.git" ]; then
              echo "→ Repo exists, pulling latest..."
              git -C "$REPO_DIR" pull origin main
            else
              echo "→ Cloning for the first time..."
              mkdir -p "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            # Ejecutar el script de deploy desde el source
            cd "$REPO_DIR"
            chmod +x deploy-verter-vpn.sh
            ./deploy-verter-vpn.sh
